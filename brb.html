<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Be Right Back</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', system-ui, sans-serif;
    color: #fff;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .clouds-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 2rem;
  }

  .brb {
    font-size: clamp(5rem, 14vw, 10rem);
    letter-spacing: -0.03em;
    line-height: 1;
    font-weight: 600;
    background:
      radial-gradient(ellipse 80% 70% at 20% 30%, rgba(120, 180, 255, 0.9) 0%, transparent 60%),
      radial-gradient(ellipse 70% 60% at 80% 65%, rgba(190, 140, 255, 0.85) 0%, transparent 55%),
      radial-gradient(ellipse 60% 50% at 55% 45%, rgba(255, 170, 140, 0.8) 0%, transparent 50%),
      radial-gradient(ellipse 50% 40% at 40% 70%, rgba(140, 220, 255, 0.7) 0%, transparent 50%),
      linear-gradient(135deg, #667eea 0%, #c084fc 25%, #fb7185 50%, #f9a8d4 75%, #93c5fd 100%);
    background-size: 300% 300%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.2s,
               gradientMove 12s ease-in-out infinite;
    opacity: 0;
  }

  @keyframes gradientMove {
    0%   { background-position: 0% 50%; }
    25%  { background-position: 100% 25%; }
    50%  { background-position: 50% 100%; }
    75%  { background-position: 0% 75%; }
    100% { background-position: 0% 50%; }
  }

  .subtext {
    margin-top: 0.8rem;
    font-size: clamp(0.95rem, 2vw, 1.2rem);
    letter-spacing: 0.01em;
    color: rgba(255, 255, 255, 0.35);
    font-weight: 400;
    opacity: 0;
    animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.4s;
  }

  .dot-container {
    margin-top: 2rem;
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    opacity: 0;
    animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.6s;
  }

  .dot {
    width: 5px;
    height: 5px;
    background: rgba(255, 255, 255, 0.25);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.4s; }
  .dot:nth-child(3) { animation-delay: 0.8s; }

  @keyframes pulse {
    0%, 100% { opacity: 0.2; transform: scale(1); }
    50%      { opacity: 0.8; transform: scale(1.3); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .status-box {
    margin-top: 2.4rem;
    opacity: 0;
    animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.8s;
  }

  .status-inner {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.6rem 1.3rem;
    border-radius: 980px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    font-size: 0.9rem;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.5);
  }

  .status-icon {
    display: flex;
    align-items: center;
    flex-shrink: 0;
  }

  .status-icon svg {
    width: 15px;
    height: 15px;
    stroke: rgba(255, 255, 255, 0.3);
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .status-text { white-space: nowrap; }

  .presets {
    margin-top: 1rem;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.4rem;
    opacity: 0;
    animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards 1s;
  }

  .preset-btn {
    padding: 0.38rem 0.95rem;
    border-radius: 980px;
    border: none;
    background: rgba(255, 255, 255, 0.06);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
    font-size: 0.78rem;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.4);
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .preset-btn:hover {
    background: rgba(255, 255, 255, 0.12);
    color: rgba(255, 255, 255, 0.7);
    transform: scale(1.04);
  }

  .preset-btn.active {
    background: rgba(255, 255, 255, 0.9);
    color: #000;
  }

  .preset-btn:active { transform: scale(0.97); }

  .steam-container {
    position: fixed;
    bottom: 12%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 0;
    pointer-events: none;
    opacity: 0;
    animation: fadeUp 2s ease forwards 2s;
  }

  .steam {
    position: absolute;
    width: 1.5px;
    background: linear-gradient(to top, rgba(255, 255, 255, 0.06), transparent);
    border-radius: 999px;
    animation: rise linear infinite;
  }

  @keyframes rise {
    0%   { opacity: 0; transform: translateY(0) scaleX(1); }
    15%  { opacity: 1; }
    70%  { opacity: 0.4; }
    100% { opacity: 0; transform: translateY(-100px) scaleX(3) translateX(var(--drift)); }
  }

  .glow {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -55%);
    width: 500px;
    height: 300px;
    z-index: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse at 30% 40%, rgba(100, 160, 255, 0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 70% 60%, rgba(180, 120, 255, 0.06) 0%, transparent 55%),
      radial-gradient(ellipse at 50% 50%, rgba(255, 150, 120, 0.05) 0%, transparent 50%);
    filter: blur(40px);
    animation: glowShift 15s ease-in-out infinite alternate;
  }

  @keyframes glowShift {
    0%   { opacity: 0.6; transform: translate(-50%, -55%) scale(1); }
    50%  { opacity: 1;   transform: translate(-48%, -53%) scale(1.1); }
    100% { opacity: 0.7; transform: translate(-52%, -57%) scale(0.95); }
  }
</style>
</head>
<body>
  <canvas class="clouds-canvas" id="cloudsCanvas"></canvas>
  <div class="glow"></div>
  <div class="steam-container" id="steamContainer"></div>

  <div class="container">
    <div class="brb">brb</div>
    <div class="subtext">Be right back.</div>
    <div class="dot-container">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <div class="status-box">
      <div class="status-inner">
        <div class="status-icon" id="statusIcon">
          <svg viewBox="0 0 24 24"><path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="6" y1="2" x2="6" y2="4"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="14" y1="2" x2="14" y2="4"/></svg>
        </div>
        <span class="status-text" id="statusText">Grabbing coffee</span>
      </div>
    </div>

    <div class="presets">
      <button class="preset-btn" data-status="Stepping away for a moment" data-icon="away">Away</button>
      <button class="preset-btn active" data-status="Grabbing coffee" data-icon="coffee">Coffee</button>
      <button class="preset-btn" data-status="Quick bio break" data-icon="bio">Bio break</button>
      <button class="preset-btn" data-status="Answering the door" data-icon="door">Door</button>
      <button class="preset-btn" data-status="Dealing with something IRL" data-icon="busy">Busy</button>
      <button class="preset-btn" data-status="Getting water" data-icon="water">Water</button>
    </div>
  </div>

<script>
  const icons = {
    away:   '<svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>',
    coffee: '<svg viewBox="0 0 24 24"><path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="6" y1="2" x2="6" y2="4"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="14" y1="2" x2="14" y2="4"/></svg>',
    bio:    '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>',
    door:   '<svg viewBox="0 0 24 24"><path d="M3 21h18"/><path d="M5 21V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16"/><path d="M9 7h1"/><path d="M9 11h1"/><path d="M9 15h1"/><circle cx="15" cy="12" r="1"/></svg>',
    busy:   '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',
    water:  '<svg viewBox="0 0 24 24"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>',
  };

  document.querySelectorAll('.preset-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('statusText').textContent = btn.dataset.status;
      document.getElementById('statusIcon').innerHTML = icons[btn.dataset.icon] || icons.away;
    });
  });

  const steamContainer = document.getElementById('steamContainer');
  for (let i = 0; i < 5; i++) {
    const wisp = document.createElement('div');
    wisp.className = 'steam';
    const h = 35 + Math.random() * 50;
    const drift = (Math.random() - 0.5) * 25;
    wisp.style.cssText = `
      height: ${h}px;
      left: ${(i - 2) * 12 + (Math.random() - 0.5) * 8}px;
      animation-duration: ${3.5 + Math.random() * 3}s;
      animation-delay: ${Math.random() * 4}s;
      --drift: ${drift}px;
      opacity: 0;
    `;
    steamContainer.appendChild(wisp);
  }

  const canvas = document.getElementById('cloudsCanvas');
  const ctx = canvas.getContext('2d');
  let W, H;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  class Cloud {
    constructor() { this.reset(true); }
    reset(init) {
      this.dots = [];
      const count = 4 + Math.floor(Math.random() * 5);
      const cx = init ? Math.random() * W : (Math.random() < 0.5 ? -80 : W + 80);
      const cy = Math.random() * H;
      for (let i = 0; i < count; i++) {
        this.dots.push({
          x: cx + (Math.random() - 0.5) * 90,
          y: cy + (Math.random() - 0.5) * 45,
          r: 1.2 + Math.random() * 1.5,
          wobbleX: Math.random() * Math.PI * 2,
          wobbleY: Math.random() * Math.PI * 2,
          wobbleSpeedX: 0.002 + Math.random() * 0.003,
          wobbleSpeedY: 0.002 + Math.random() * 0.004,
          wobbleAmpX: 2 + Math.random() * 3,
          wobbleAmpY: 1.5 + Math.random() * 2.5,
        });
      }
      this.vx = (0.1 + Math.random() * 0.18) * (Math.random() < 0.5 ? 1 : -1);
      this.vy = (Math.random() - 0.5) * 0.04;
      this.opacity = 0.06 + Math.random() * 0.1;
      this.connectDist = 38 + Math.random() * 22;
    }
    update() {
      let out = true;
      for (const d of this.dots) {
        d.x += this.vx;
        d.y += this.vy;
        d.wobbleX += d.wobbleSpeedX;
        d.wobbleY += d.wobbleSpeedY;
        if (d.x > -120 && d.x < W + 120 && d.y > -120 && d.y < H + 120) out = false;
      }
      if (out) this.reset(false);
    }
    draw() {
      ctx.save();
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
      ctx.lineWidth = 0.5;
      for (let i = 0; i < this.dots.length; i++) {
        for (let j = i + 1; j < this.dots.length; j++) {
          const a = this.dots[i], b = this.dots[j];
          const ax = a.x + Math.sin(a.wobbleX) * a.wobbleAmpX;
          const ay = a.y + Math.sin(a.wobbleY) * a.wobbleAmpY;
          const bx = b.x + Math.sin(b.wobbleX) * b.wobbleAmpX;
          const by = b.y + Math.sin(b.wobbleY) * b.wobbleAmpY;
          const dist = Math.hypot(ax - bx, ay - by);
          if (dist < this.connectDist) {
            ctx.globalAlpha = this.opacity * (1 - dist / this.connectDist);
            ctx.beginPath();
            ctx.moveTo(ax, ay);
            ctx.lineTo(bx, by);
            ctx.stroke();
          }
        }
      }
      ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
      for (const d of this.dots) {
        const dx = d.x + Math.sin(d.wobbleX) * d.wobbleAmpX;
        const dy = d.y + Math.sin(d.wobbleY) * d.wobbleAmpY;
        ctx.globalAlpha = this.opacity * 1.5;
        ctx.beginPath();
        ctx.arc(dx, dy, d.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }
  }

  const clouds = [];
  for (let i = 0; i < 8; i++) clouds.push(new Cloud());

  function animate() {
    ctx.clearRect(0, 0, W, H);
    for (const c of clouds) { c.update(); c.draw(); }
    requestAnimationFrame(animate);
  }
  animate();
</script>
</body>
</html>
