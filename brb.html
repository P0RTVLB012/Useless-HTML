<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Be Right Back</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

.circle {
  height: 24px; width: 24px;
  border-radius: 24px;
  position: fixed;
  top: 0; left: 0;
  pointer-events: none;
  z-index: 999;
  display: block;
}

body {
  height: 100vh;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #000;
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', system-ui, sans-serif;
  color: #fff;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body.mango-bg { animation: mangoBgFlash 0.25s step-end infinite; }
@keyframes mangoBgFlash {
  0%  { background: #000; }
  50% { background: #1a0a00; }
}

.flying67 {
  position: fixed;
  font-weight: 800;
  color: #ffcc00;
  pointer-events: none;
  z-index: 50;
  animation: pop67 0.5s ease-out forwards;
  text-shadow: 0 0 12px #ff9500, 0 0 24px #ff6b00;
}
@keyframes pop67 {
  0%   { opacity: 0; transform: scale(0.4); }
  30%  { opacity: 1; transform: scale(1.3); }
  100% { opacity: 0; transform: scale(0.8) translateY(-30px); }
}

.mango-shake {
  animation: mangoShake 0.08s linear infinite, gradientMove 12s ease-in-out infinite !important;
}
@keyframes mangoShake {
  0%   { transform: translate(-4px,-3px) rotate(-1deg); }
  25%  { transform: translate(4px,3px) rotate(1deg); }
  50%  { transform: translate(-3px,4px) rotate(-0.5deg); }
  75%  { transform: translate(3px,-4px) rotate(0.5deg); }
  100% { transform: translate(-4px,-3px) rotate(-1deg); }
}

.clouds-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

.glow {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -55%);
  width: 500px; height: 300px;
  z-index: 0;
  pointer-events: none;
  background:
    radial-gradient(ellipse at 30% 40%, rgba(100,160,255,0.08) 0%, transparent 60%),
    radial-gradient(ellipse at 70% 60%, rgba(180,120,255,0.06) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 50%, rgba(255,150,120,0.05) 0%, transparent 50%);
  filter: blur(40px);
  animation: glowShift 15s ease-in-out infinite alternate;
}
@keyframes glowShift {
  0%   { opacity: 0.6; transform: translate(-50%,-55%) scale(1); }
  50%  { opacity: 1;   transform: translate(-48%,-53%) scale(1.1); }
  100% { opacity: 0.7; transform: translate(-52%,-57%) scale(0.95); }
}

.steam-container {
  position: fixed;
  bottom: 12%; left: 50%;
  transform: translateX(-50%);
  z-index: 0;
  pointer-events: none;
  opacity: 0;
  animation: fadeUp 2s ease forwards 2s;
}
.steam {
  position: absolute;
  width: 1.5px;
  background: linear-gradient(to top, rgba(255,255,255,0.06), transparent);
  border-radius: 999px;
  animation: rise linear infinite;
}
@keyframes rise {
  0%   { opacity: 0; transform: translateY(0) scaleX(1); }
  15%  { opacity: 1; }
  70%  { opacity: 0.4; }
  100% { opacity: 0; transform: translateY(-100px) scaleX(3) translateX(var(--drift)); }
}

.watermark {
  position: fixed;
  bottom: 1.2rem; right: 1.4rem;
  z-index: 2;
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
  font-size: 0.65rem; font-weight: 400;
  letter-spacing: 0.02em;
  color: rgba(255,255,255,0.18);
  opacity: 0;
  animation: fadeUp 1s cubic-bezier(0.16,1,0.3,1) forwards 1.4s;
  pointer-events: none;
  user-select: none;
}

.hide-hint {
  position: fixed;
  bottom: 1.2rem; left: 50%;
  transform: translateX(-50%);
  font-size: 0.62rem;
  color: rgba(255,255,255,0.18);
  letter-spacing: 0.05em;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.4s ease;
  z-index: 2;
}

.container {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 2rem;
}

.brb {
  font-size: clamp(5rem, 14vw, 10rem);
  letter-spacing: -0.03em;
  line-height: 1;
  font-weight: 600;
  background:
    radial-gradient(ellipse 80% 70% at 20% 30%, rgba(120,180,255,0.9) 0%, transparent 60%),
    radial-gradient(ellipse 70% 60% at 80% 65%, rgba(190,140,255,0.85) 0%, transparent 55%),
    radial-gradient(ellipse 60% 50% at 55% 45%, rgba(255,170,140,0.8) 0%, transparent 50%),
    radial-gradient(ellipse 50% 40% at 40% 70%, rgba(140,220,255,0.7) 0%, transparent 50%),
    linear-gradient(135deg, #667eea 0%, #c084fc 25%, #fb7185 50%, #f9a8d4 75%, #93c5fd 100%);
  background-size: 300% 300%;
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: fadeUp 1s cubic-bezier(0.16,1,0.3,1) forwards 0.2s, gradientMove 12s ease-in-out infinite;
  opacity: 0;
}
@keyframes gradientMove {
  0%   { background-position: 0% 50%; }
  25%  { background-position: 100% 25%; }
  50%  { background-position: 50% 100%; }
  75%  { background-position: 0% 75%; }
  100% { background-position: 0% 50%; }
}

.subtext {
  margin-top: 0.8rem;
  font-size: clamp(0.95rem, 2vw, 1.2rem);
  letter-spacing: 0.01em;
  color: rgba(255,255,255,0.35);
  font-weight: 400;
  opacity: 0;
  animation: fadeUp 1s cubic-bezier(0.16,1,0.3,1) forwards 0.4s;
  transition: opacity 0.4s ease;
}

.dot-container {
  margin-top: 2rem;
  display: flex; justify-content: center; gap: 0.5rem;
  opacity: 0;
  animation: fadeUp 1s cubic-bezier(0.16,1,0.3,1) forwards 0.6s;
  transition: opacity 0.4s ease;
}
.dot {
  width: 5px; height: 5px;
  background: rgba(255,255,255,0.25);
  border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
}
.dot:nth-child(2) { animation-delay: 0.4s; }
.dot:nth-child(3) { animation-delay: 0.8s; }
@keyframes pulse {
  0%,100% { opacity: 0.2; transform: scale(1); }
  50%     { opacity: 0.8; transform: scale(1.3); }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.status-box {
  margin-top: 2.4rem;
  opacity: 0;
  animation: fadeUp 1s cubic-bezier(0.16,1,0.3,1) forwards 0.8s;
  transition: opacity 0.4s ease;
}
.status-inner {
  display: inline-flex; align-items: center; gap: 0.6rem;
  padding: 0.6rem 1.3rem;
  border-radius: 980px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  font-size: 0.9rem; font-weight: 400;
  color: rgba(255,255,255,0.5);
}
.status-icon {
  display: flex; align-items: center; flex-shrink: 0;
}
.status-icon svg {
  width: 15px; height: 15px;
  stroke: rgba(255,255,255,0.3);
  fill: none;
  stroke-width: 1.5;
  stroke-linecap: round; stroke-linejoin: round;
}
.status-text { white-space: nowrap; }

.presets {
  margin-top: 1rem;
  display: flex; flex-wrap: wrap; justify-content: center; gap: 0.4rem;
  opacity: 0;
  animation: fadeUp 1s cubic-bezier(0.16,1,0.3,1) forwards 1s;
  transition: opacity 0.4s ease;
}
.preset-btn {
  padding: 0.38rem 0.95rem;
  border-radius: 980px; border: none;
  background: rgba(255,255,255,0.06);
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
  font-size: 0.78rem; font-weight: 400;
  color: rgba(255,255,255,0.4);
  cursor: none;
  transition: all 0.25s cubic-bezier(0.16,1,0.3,1);
}
.preset-btn:hover { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.7); transform: scale(1.04); }
.preset-btn.active { background: rgba(255,255,255,0.9); color: #000; }
.preset-btn:active { transform: scale(0.97); }

.custom-status {
  margin-top: 0.75rem;
  display: flex; justify-content: center; gap: 0.4rem;
  opacity: 0;
  animation: fadeUp 1s cubic-bezier(0.16,1,0.3,1) forwards 1.1s;
  transition: opacity 0.4s ease;
}
.emoji-wrap { position: relative; display: inline-flex; }
.emoji-btn {
  padding: 0.38rem 0.7rem;
  border-radius: 980px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.06);
  font-size: 0.85rem; cursor: none;
  transition: all 0.25s cubic-bezier(0.16,1,0.3,1);
  line-height: 1; display: flex; align-items: center;
}
.emoji-btn:hover { background: rgba(255,255,255,0.12); transform: scale(1.06); }
.emoji-btn:active { transform: scale(0.97); }

.custom-input {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 980px;
  padding: 0.38rem 1rem;
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
  font-size: 0.78rem; font-weight: 400;
  color: rgba(255,255,255,0.6);
  outline: none; width: 210px; cursor: text;
  transition: all 0.25s cubic-bezier(0.16,1,0.3,1);
}
.custom-input::placeholder { color: rgba(255,255,255,0.2); }
.custom-input:focus {
  border-color: rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.09);
  color: rgba(255,255,255,0.8);
}

.set-btn {
  padding: 0.38rem 0.95rem;
  border-radius: 980px; border: none;
  background: rgba(255,255,255,0.1);
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
  font-size: 0.78rem; font-weight: 400;
  color: rgba(255,255,255,0.5);
  cursor: none;
  transition: all 0.25s cubic-bezier(0.16,1,0.3,1);
}
.set-btn:hover { background: rgba(255,255,255,0.18); color: rgba(255,255,255,0.85); transform: scale(1.04); }
.set-btn:active { transform: scale(0.97); }

.emoji-picker {
  position: absolute;
  bottom: calc(100% + 0.5rem); left: 50%;
  transform: translateX(-50%);
  background: rgba(14,14,14,0.97);
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(30px) saturate(180%);
  -webkit-backdrop-filter: blur(30px) saturate(180%);
  border-radius: 16px; padding: 0.6rem;
  display: none;
  flex-direction: column;
  gap: 0;
  z-index: 10; width: 280px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
}
.emoji-picker.open { display: flex; }
.emoji-option {
  font-size: 1.15rem; padding: 0.22rem;
  border-radius: 6px; cursor: none;
  text-align: center; line-height: 1.4;
  transition: background 0.12s ease;
  border: none; background: none;
  flex-shrink: 0;
}
.emoji-option:hover { background: rgba(255,255,255,0.1); }
.emoji-option.selected { background: rgba(255,255,255,0.2); }
.emoji-picker ::-webkit-scrollbar { width: 4px; }
.emoji-picker ::-webkit-scrollbar-track { background: transparent; }
.emoji-picker ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 4px; }

/* mango stop */
.mango-stop {
  display: none;
  margin-top: 1rem;
  padding: 0.45rem 1.1rem;
  border-radius: 980px;
  border: 1px solid rgba(255,180,0,0.35);
  background: rgba(255,150,0,0.12);
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
  font-size: 0.78rem;
  color: rgba(255,200,80,0.9);
  cursor: none;
  transition: all 0.2s ease;
  animation: fadeUp 0.4s ease forwards;
}
.mango-stop:hover { background: rgba(255,150,0,0.22); color: #ffd60a; transform: scale(1.04); }
.mango-stop:active { transform: scale(0.97); }

/* color scheme row */
.scheme-row {
  margin-top: 0.9rem;
  display: flex; justify-content: center; align-items: center; gap: 0.5rem;
  opacity: 0;
  animation: fadeUp 1s cubic-bezier(0.16,1,0.3,1) forwards 1.2s;
  transition: opacity 0.4s ease;
}
.scheme-label {
  font-size: 0.62rem;
  color: rgba(255,255,255,0.2);
  letter-spacing: 0.07em;
  text-transform: uppercase;
  margin-right: 0.15rem;
}
.scheme-btn {
  width: 16px; height: 16px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: none;
  transition: all 0.2s ease;
  flex-shrink: 0;
}
.scheme-btn:hover { transform: scale(1.3); }
.scheme-btn.active { border-color: rgba(255,255,255,0.75); transform: scale(1.2); }

/* font row */
.font-row {
  margin-top: 0.55rem;
  display: flex; justify-content: center; align-items: center; gap: 0.35rem;
  opacity: 0;
  animation: fadeUp 1s cubic-bezier(0.16,1,0.3,1) forwards 1.3s;
  transition: opacity 0.4s ease;
}
.font-label {
  font-size: 0.62rem;
  color: rgba(255,255,255,0.2);
  letter-spacing: 0.07em;
  text-transform: uppercase;
  margin-right: 0.15rem;
}
.font-btn {
  padding: 0.25rem 0.65rem;
  border-radius: 980px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.04);
  font-size: 0.72rem;
  color: rgba(255,255,255,0.35);
  cursor: none;
  transition: all 0.2s ease;
}
.font-btn:hover { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); transform: scale(1.05); }
.font-btn.active { background: rgba(255,255,255,0.13); color: rgba(255,255,255,0.8); border-color: rgba(255,255,255,0.2); }
</style>
</head>
<body>

  <div class="circle"></div><div class="circle"></div><div class="circle"></div>

  <div class="circle"></div><div class="circle"></div><div class="circle"></div>

<script>
  function isTyping(event) {
  const tag = event.target.tagName;

  return (
    tag === "INPUT" ||
    tag === "TEXTAREA" ||
    event.target.isContentEditable
  );
}
  // fullscreen functions
  function toggleFullScreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(err => {
      console.error(`Error attempting to enable full-screen mode: ${err.message}`);
    });
  } else {
    document.exitFullscreen();
  }
}

  // fullscreen shortcut
document.addEventListener("keydown", (e) => {

  if (isTyping(e)) return;

  if (e.key === "f" || e.key === "F") {
    toggleFullScreen();
  }
});

// close mouse thing shortcut
window.addEventListener("keydown", (event) => {

  if (isTyping(event)) return;

  if (event.key === "m") {

    document.querySelectorAll(".circle").forEach(el => {
      el.style.display =
        el.style.display === "none" ? "block" : "none";
    });

  }
});

// close ui shortcut
window.addEventListener("keydown", (event) => {

  if (isTyping(event)) return;

  if (event.key === "u") {

    document.querySelectorAll(".scheme-row").forEach(el => {
      el.style.display =
        el.style.display === "none" ? "block" : "none";
    });

    document.querySelectorAll(".font-row").forEach(el => {
      el.style.display =
        el.style.display === "none" ? "block" : "none";
    });

    document.querySelectorAll(".custom-status").forEach(el => {
      el.style.display =
        el.style.display === "none" ? "block" : "none";
    });

    document.querySelectorAll(".presets").forEach(el => {
      el.style.display =
        el.style.display === "none" ? "block" : "none";
    });

    document.querySelectorAll(".watermark").forEach(el => {
      el.style.display =
        el.style.display === "none" ? "block" : "none";
    });

  }
});

// ── cursor hide ──────────────────────────────────────────────────
document.addEventListener("mousemove", () => { document.body.style.cursor = "none"; });

// ── mouse trail ──────────────────────────────────────────────────
const coords = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
const circles = document.querySelectorAll(".circle");
let trailColors = ["#667eea","#8180f1","#9b82f7","#b483fb","#d47ced","#ef70cb","#fb6ca7","#fb7185"];

circles.forEach((c, i) => {
  c.x = coords.x; c.y = coords.y;
  c.style.backgroundColor = trailColors[i % trailColors.length];
  c.style.zIndex = circles.length - i;
});
window.addEventListener("mousemove", e => { coords.x = e.clientX; coords.y = e.clientY; });

function animateCircles() {
  let x = coords.x, y = coords.y;
  circles.forEach((c, i) => {
    c.style.left = x - 12 + "px";
    c.style.top  = y - 12 + "px";
    c.style.scale = (circles.length - i) / circles.length;
    c.x = x; c.y = y;
    const next = circles[i + 1] || circles[0];
    x += (next.x - x) * 0.3;
    y += (next.y - y) * 0.3;
  });
  requestAnimationFrame(animateCircles);
}
animateCircles();

function updateTrailColors(cols) {
  trailColors = cols;
  circles.forEach((c, i) => c.style.backgroundColor = cols[i % cols.length]);
}

// ── icons ────────────────────────────────────────────────────────

const ALL_EMOJIS_FLAT = Object.values(EMOJI_CATS).flat();

let selectedEmoji = '✨';
const emojiBtn    = document.getElementById('emojiBtn');
const emojiPicker = document.getElementById('emojiPicker');

function buildPicker(filter = '') {
  emojiPicker.innerHTML = '';

  // search bar
  const searchWrap = document.createElement('div');
  searchWrap.style.cssText = 'padding:0 0 0.5rem 0;width:100%;';
  const searchInput = document.createElement('input');
  searchInput.type = 'text';
  searchInput.placeholder = 'search emoji…';
  searchInput.value = filter;
  searchInput.style.cssText = `
    width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
    border-radius:8px;padding:0.3rem 0.6rem;font-size:0.75rem;color:rgba(255,255,255,0.7);
    outline:none;font-family:inherit;cursor:text;
  `;
  searchInput.addEventListener('input', e => {
    e.stopPropagation();
    buildPicker(e.target.value);
    emojiPicker.querySelector('input')?.focus();
  });
  searchInput.addEventListener('click', e => e.stopPropagation());
  searchInput.addEventListener('keydown', e => e.stopPropagation());
  searchWrap.appendChild(searchInput);
  emojiPicker.appendChild(searchWrap);

  const lc = filter.toLowerCase();
  const grid = document.createElement('div');
  grid.style.cssText = 'display:grid;grid-template-columns:repeat(8,1fr);gap:0.15rem;max-height:220px;overflow-y:auto;overflow-x:hidden;';
  // custom scrollbar
  grid.style.scrollbarWidth = 'thin';
  grid.style.scrollbarColor = 'rgba(255,255,255,0.15) transparent';

  if (filter) {
    // flat search
    ALL_EMOJIS_FLAT.filter(e => {
      // basic name match via codepoint description not available, so just show all on empty
      return true;
    });
    const matches = ALL_EMOJIS_FLAT.filter((e, i, a) => a.indexOf(e) === i); // dedupe
    // For search we do substring match on the emoji itself (works for typed emoji chars)
    // and show everything since we can't search by name without a DB
    const toShow = filter ? ALL_EMOJIS_FLAT.filter((e,i,a)=>a.indexOf(e)===i && e.includes(lc)) : ALL_EMOJIS_FLAT.filter((e,i,a)=>a.indexOf(e)===i);
    if (toShow.length === 0) {
      const msg = document.createElement('div');
      msg.style.cssText = 'color:rgba(255,255,255,0.3);font-size:0.72rem;padding:0.5rem;text-align:center;grid-column:1/-1;';
      msg.textContent = 'no results';
      grid.appendChild(msg);
    }
    toShow.forEach(e => grid.appendChild(makeBtn(e)));
  } else {
    // categorized
    Object.entries(EMOJI_CATS).forEach(([cat, emojis]) => {
      const label = document.createElement('div');
      label.style.cssText = 'font-size:0.6rem;color:rgba(255,255,255,0.25);letter-spacing:0.05em;text-transform:uppercase;padding:0.4rem 0 0.15rem;grid-column:1/-1;';
      label.textContent = cat;
      grid.appendChild(label);
      emojis.forEach(e => grid.appendChild(makeBtn(e)));
    });
  }

  emojiPicker.appendChild(grid);
  if (filter) searchInput.focus();
}

function makeBtn(e) {
  const b = document.createElement('button');
  b.className = 'emoji-option' + (e === selectedEmoji ? ' selected' : '');
  b.textContent = e;
  b.title = e;
  b.addEventListener('click', ev => {
    ev.stopPropagation();
    selectedEmoji = e;
    emojiBtn.textContent = e;
    document.querySelectorAll('.emoji-option').forEach(o => o.classList.remove('selected'));
    b.classList.add('selected');
    emojiPicker.classList.remove('open');
  });
  return b;
}

emojiBtn.addEventListener('click', ev => {
  ev.stopPropagation();
  const isOpen = emojiPicker.classList.toggle('open');
  if (isOpen) { buildPicker(); setTimeout(()=>emojiPicker.querySelector('input')?.focus(), 50); }
});
document.addEventListener('click', () => emojiPicker.classList.remove('open'));
emojiPicker.addEventListener('click', e => e.stopPropagation());

// ── custom status ────────────────────────────────────────────────
function applyCustomStatus() {
  const text = document.getElementById('customInput').value.trim();
  if (!text) return;
  if (text.toLowerCase() === 'mango67') { activateMango(); return; }
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('statusText').textContent = text;
  document.getElementById('statusIcon').innerHTML =
    `<span style="font-size:0.95rem;line-height:1;">${selectedEmoji}</span>`;
}
document.getElementById('setBtn').addEventListener('click', applyCustomStatus);
document.getElementById('customInput').addEventListener('keydown', e => { if (e.key === 'Enter') applyCustomStatus(); });

// ── mango 67 ─────────────────────────────────────────────────────
let mangoActive = false, mangoIntervals = [];

function activateMango() {
  if (mangoActive) return;
  mangoActive = true;
  const brbEl = document.getElementById('brbText');
  brbEl.textContent = 'mango';
  brbEl.classList.add('mango-shake');
  brbEl.style.backgroundImage = 'linear-gradient(135deg,#ff9500 0%,#ffcc00 25%,#ff6b00 50%,#ffd60a 75%,#ff9500 100%)';
  document.body.classList.add('mango-bg');
  document.getElementById('mangoStop').style.display = 'inline-block';
  updateTrailColors(['#ff9500','#ffcc00','#ff6b00','#ffd60a','#ffb700','#ff8c00','#ffc300','#ff6000']);
  mangoIntervals.push(setInterval(spawnSixSeven, 120));
}

function spawnSixSeven() {
  const el = document.createElement('div');
  el.className = 'flying67';
  el.textContent = '67';
  el.style.left = Math.random() * 100 + 'vw';
  el.style.top  = Math.random() * 100 + 'vh';
  el.style.fontSize = (1.2 + Math.random() * 3.5) + 'rem';
  el.style.animationDuration = (0.4 + Math.random() * 0.5) + 's';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 800);
}

function deactivateMango() {
  if (!mangoActive) return;
  mangoActive = false;
  mangoIntervals.forEach(clearInterval);
  mangoIntervals = [];
  document.querySelectorAll('.flying67').forEach(e => e.remove());
  const brbEl = document.getElementById('brbText');
  brbEl.textContent = 'brb';
  brbEl.classList.remove('mango-shake');
  brbEl.style.backgroundImage = '';
  document.body.classList.remove('mango-bg');
  document.getElementById('mangoStop').style.display = 'none';
  document.getElementById('statusText').textContent = 'Grabbing coffee';
  document.getElementById('statusIcon').innerHTML = icons.coffee;
  document.getElementById('customInput').value = '';
  const active = document.querySelector('.scheme-btn.active');
  if (active) applyScheme(active.dataset.scheme);
  else updateTrailColors(["#667eea","#8180f1","#9b82f7","#b483fb","#d47ced","#ef70cb","#fb6ca7","#fb7185"]);
}
document.getElementById('mangoStop').addEventListener('click', deactivateMango);

// ── hide UI (H key) ──────────────────────────────────────────────
let uiHidden = false;
const uiSelectors = ['.status-box','.presets','.custom-status','.subtext','.dot-container','.scheme-row','.font-row','#mangoStop'];
document.addEventListener('keydown', e => {
  if (e.key.toLowerCase() !== 'h') return;
  uiHidden = !uiHidden;
  uiSelectors.forEach(sel => {
    const el = document.querySelector(sel);
    if (el) el.style.opacity = uiHidden ? '0' : '';
  });
  const hint = document.getElementById('hideHint');
  if (!uiHidden) { hint.style.opacity = '1'; setTimeout(() => hint.style.opacity = '0', 2000); }
});

// ── color schemes ────────────────────────────────────────────────
const schemes = {
  default:  { grad: 'radial-gradient(ellipse 80% 70% at 20% 30%,rgba(120,180,255,0.9) 0%,transparent 60%),radial-gradient(ellipse 70% 60% at 80% 65%,rgba(190,140,255,0.85) 0%,transparent 55%),linear-gradient(135deg,#667eea 0%,#c084fc 25%,#fb7185 50%,#f9a8d4 75%,#93c5fd 100%)', trail: ["#667eea","#8180f1","#9b82f7","#b483fb","#d47ced","#ef70cb","#fb6ca7","#fb7185"] },
  sunset:   { grad: 'linear-gradient(135deg,#f97316 0%,#fb923c 25%,#fbbf24 50%,#f43f5e 75%,#e11d48 100%)', trail: ["#f97316","#fb923c","#fbbf24","#f43f5e","#e11d48","#ff6b35","#ffd60a","#ff4d6d"] },
  ocean:    { grad: 'linear-gradient(135deg,#06b6d4 0%,#3b82f6 30%,#6366f1 60%,#0ea5e9 100%)', trail: ["#06b6d4","#3b82f6","#6366f1","#0ea5e9","#38bdf8","#60a5fa","#818cf8","#22d3ee"] },
  forest:   { grad: 'linear-gradient(135deg,#4ade80 0%,#22d3ee 30%,#86efac 60%,#6ee7b7 100%)', trail: ["#4ade80","#22d3ee","#86efac","#6ee7b7","#34d399","#5eead4","#a7f3d0","#67e8f9"] },
  midnight: { grad: 'linear-gradient(135deg,#818cf8 0%,#c084fc 35%,#e879f9 65%,#a78bfa 100%)', trail: ["#818cf8","#c084fc","#e879f9","#a78bfa","#9333ea","#7c3aed","#d946ef","#6d28d9"] },
  rose:     { grad: 'linear-gradient(135deg,#fb7185 0%,#f9a8d4 35%,#fda4af 65%,#fecdd3 100%)', trail: ["#fb7185","#f9a8d4","#fda4af","#fecdd3","#f43f5e","#fb923c","#fbbf24","#e11d48"] },
};

function applyScheme(name) {
  if (mangoActive) return;
  const s = schemes[name] || schemes.default;
  document.getElementById('brbText').style.backgroundImage = s.grad;
  updateTrailColors(s.trail);
}
document.querySelectorAll('.scheme-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.scheme-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyScheme(btn.dataset.scheme);
  });
});

// ── font picker ──────────────────────────────────────────────────
document.querySelectorAll('.font-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.font-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('brbText').style.fontFamily = btn.dataset.font;
  });
});

// ── steam ────────────────────────────────────────────────────────
const steamContainer = document.getElementById('steamContainer');
for (let i = 0; i < 5; i++) {
  const w = document.createElement('div');
  w.className = 'steam';
  const drift = (Math.random() - 0.5) * 25;
  w.style.cssText = `height:${35+Math.random()*50}px;left:${(i-2)*12+(Math.random()-0.5)*8}px;animation-duration:${3.5+Math.random()*3}s;animation-delay:${Math.random()*4}s;--drift:${drift}px;opacity:0;`;
  steamContainer.appendChild(w);

// ── canvas clouds ────────────────────────────────────────────────
const canvas = document.getElementById('cloudsCanvas');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

class Cloud {
  constructor() { this.reset(true); }
  reset(init) {
    this.dots = [];
    const count = 4 + Math.floor(Math.random() * 5);
    const cx = init ? Math.random() * W : (Math.random() < 0.5 ? -80 : W + 80);
    const cy = Math.random() * H;
    for (let i = 0; i < count; i++) {
      this.dots.push({
        x: cx+(Math.random()-0.5)*90, y: cy+(Math.random()-0.5)*45,
        r: 1.2+Math.random()*1.5,
        wobbleX: Math.random()*Math.PI*2, wobbleY: Math.random()*Math.PI*2,
        wobbleSpeedX: 0.002+Math.random()*0.003, wobbleSpeedY: 0.002+Math.random()*0.004,
        wobbleAmpX: 2+Math.random()*3, wobbleAmpY: 1.5+Math.random()*2.5,
      });
    }
    this.vx = (0.1+Math.random()*0.18)*(Math.random()<0.5?1:-1);
    this.vy = (Math.random()-0.5)*0.04;
    this.opacity = 0.06+Math.random()*0.1;
    this.connectDist = 38+Math.random()*22;
  }
  update() {
    let out = true;
    for (const d of this.dots) {
      d.x += this.vx; d.y += this.vy;
      d.wobbleX += d.wobbleSpeedX; d.wobbleY += d.wobbleSpeedY;
      if (d.x>-120&&d.x<W+120&&d.y>-120&&d.y<H+120) out = false;
    }
    if (out) this.reset(false);
  }
  draw() {
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 0.5;
    for (let i = 0; i < this.dots.length; i++) {
      for (let j = i+1; j < this.dots.length; j++) {
        const a = this.dots[i], b = this.dots[j];
        const ax = a.x+Math.sin(a.wobbleX)*a.wobbleAmpX, ay = a.y+Math.sin(a.wobbleY)*a.wobbleAmpY;
        const bx = b.x+Math.sin(b.wobbleX)*b.wobbleAmpX, by = b.y+Math.sin(b.wobbleY)*b.wobbleAmpY;
        const dist = Math.hypot(ax-bx, ay-by);
        if (dist < this.connectDist) {
          ctx.globalAlpha = this.opacity*(1-dist/this.connectDist);
          ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(bx,by); ctx.stroke();
        }
      }
    }
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    for (const d of this.dots) {
      const dx = d.x+Math.sin(d.wobbleX)*d.wobbleAmpX, dy = d.y+Math.sin(d.wobbleY)*d.wobbleAmpY;
      ctx.globalAlpha = this.opacity*1.5;
      ctx.beginPath(); ctx.arc(dx,dy,d.r,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }
}

const clouds = [];
for (let i = 0; i < 8; i++) clouds.push(new Cloud());
function animate() {
  ctx.clearRect(0,0,W,H);
  for (const c of clouds) { c.update(); c.draw(); }
  requestAnimationFrame(animate);
}
animate();
</script>
